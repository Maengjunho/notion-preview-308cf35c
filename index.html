<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #1e293b; line-height: 1.6; -webkit-font-smoothing: antialiased; }
.page-root { min-height: 100vh; background: #fff; }

/* Hero */
.hero { min-height: 90vh; background: linear-gradient(135deg, #1e3a8a 0%, #6366f1 50%, #8b5cf6 100%); color: white; display: flex; align-items: center; justify-content: center; padding: 4rem 1.5rem; }
.hero-inner { max-width: 900px; text-align: center; }
.hero-badge { display: inline-block; padding: 0.5rem 1rem; background: rgba(255,255,255,0.18); border-radius: 999px; font-size: 0.875rem; font-weight: 500; margin-bottom: 1.5rem; backdrop-filter: blur(10px); }
.hero-title { font-size: 3rem; font-weight: 800; line-height: 1.2; margin-bottom: 1.5rem; letter-spacing: -0.02em; }
.hero-subtitle { font-size: 1.25rem; opacity: 0.92; margin-bottom: 2.5rem; line-height: 1.6; }
.hero-cta { display: inline-block; padding: 1rem 2.5rem; background: white; color: #6366f1; border-radius: 0.75rem; font-size: 1.125rem; font-weight: 700; box-shadow: 0 10px 30px rgba(0,0,0,0.2); cursor: pointer; border: none; transition: all 0.2s; }
.hero-cta:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(0,0,0,0.25); }

/* Sections */
.section { padding: 5rem 1.5rem; }
.section-inner { max-width: 1100px; margin: 0 auto; }
.section-eyebrow { font-size: 0.875rem; font-weight: 600; color: #6366f1; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; text-align: center; }
.section-title { font-size: 2.25rem; font-weight: 800; color: #1e293b; text-align: center; margin-bottom: 1rem; letter-spacing: -0.02em; }
.section-desc { font-size: 1.125rem; color: #64748b; text-align: center; max-width: 600px; margin: 0 auto 3rem; }

/* Intro cards */
.intro-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-top: 3rem; }
.intro-card { padding: 2rem; background: #f8fafc; border-radius: 1rem; border: 1px solid #e2e8f0; transition: all 0.2s; }
.intro-card:hover { border-color: #6366f1; transform: translateY(-4px); box-shadow: 0 10px 30px rgba(99,102,241,0.1); }
.intro-icon { font-size: 2.5rem; margin-bottom: 1rem; }
.intro-card-title { font-size: 1.25rem; font-weight: 700; color: #1e293b; margin-bottom: 0.5rem; }
.intro-card-desc { font-size: 0.95rem; color: #64748b; line-height: 1.6; }

/* Reviews */
.reviews-bg { background: #f8fafc; }
.reviews-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
.review-card { padding: 1.75rem; background: white; border-radius: 1rem; border: 1px solid #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.review-stars { color: #fbbf24; font-size: 1.125rem; margin-bottom: 0.75rem; letter-spacing: 0.1em; }
.review-text { color: #334155; line-height: 1.7; margin-bottom: 1.25rem; font-size: 0.95rem; }
.review-meta { display: flex; justify-content: space-between; align-items: center; padding-top: 1rem; border-top: 1px solid #f1f5f9; }
.review-author { font-weight: 600; color: #1e293b; font-size: 0.95rem; }
.review-clinic { font-size: 0.8rem; color: #94a3b8; margin-top: 0.125rem; }
.review-date { font-size: 0.8rem; color: #94a3b8; }
.pager { display: flex; justify-content: center; gap: 0.5rem; margin-top: 2.5rem; flex-wrap: wrap; }
.pager button { padding: 0.5rem 0.875rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; background: white; color: #475569; font-size: 0.875rem; cursor: pointer; transition: all 0.2s; min-width: 2.5rem; }
.pager button:hover:not(:disabled) { background: #6366f1; color: white; border-color: #6366f1; }
.pager button.active { background: #6366f1; color: white; border-color: #6366f1; }
.pager button:disabled { opacity: 0.4; cursor: not-allowed; }
.state-msg { text-align: center; padding: 3rem; color: #64748b; }

/* Form */
.form-bg { background: linear-gradient(180deg, #fff 0%, #f8fafc 100%); }
.form-card { max-width: 640px; margin: 0 auto; padding: 2.5rem; background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 20px 50px rgba(0,0,0,0.06); }
.form-row { margin-bottom: 1.25rem; }
.form-row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-label { display: block; font-size: 0.875rem; font-weight: 600; color: #334155; margin-bottom: 0.5rem; }
.form-input, .form-textarea { width: 100%; padding: 0.75rem 1rem; border: 1px solid #cbd5e1; border-radius: 0.5rem; font-size: 1rem; font-family: inherit; transition: all 0.2s; background: white; }
.form-input:focus, .form-textarea:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
.form-textarea { min-height: 120px; resize: vertical; }
.form-radio-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
.form-radio { padding: 0.75rem 1rem; border: 1px solid #cbd5e1; border-radius: 0.5rem; cursor: pointer; text-align: center; font-size: 0.95rem; transition: all 0.2s; user-select: none; }
.form-radio.selected { background: #6366f1; color: white; border-color: #6366f1; }
.form-radio input { display: none; }
.form-consent { display: flex; align-items: flex-start; gap: 0.625rem; margin: 1.5rem 0; font-size: 0.875rem; color: #475569; cursor: pointer; }
.form-consent input { margin-top: 0.2rem; cursor: pointer; }
.form-error { color: #dc2626; font-size: 0.8125rem; margin-top: 0.375rem; }
.form-submit { width: 100%; padding: 1rem; background: #6366f1; color: white; border: none; border-radius: 0.75rem; font-size: 1.0625rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.form-submit:hover:not(:disabled) { background: #4f46e5; transform: translateY(-1px); box-shadow: 0 10px 25px rgba(99,102,241,0.3); }
.form-submit:disabled { opacity: 0.5; cursor: not-allowed; }
.form-success { padding: 2rem; background: #f0fdf4; border: 1px solid #86efac; border-radius: 1rem; text-align: center; color: #166534; }
.form-success-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }

/* Footer */
.footer { background: #0f172a; color: #94a3b8; padding: 2rem 1.5rem; text-align: center; font-size: 0.875rem; }

/* Responsive */
@media (max-width: 640px) {
  .hero-title { font-size: 2rem; }
  .hero-subtitle { font-size: 1rem; }
  .section { padding: 3.5rem 1.25rem; }
  .section-title { font-size: 1.75rem; }
  .form-card { padding: 1.5rem; }
  .form-row-grid { grid-template-columns: 1fr; }
  .form-radio-group { grid-template-columns: 1fr; }
}
</style>

\n        <div className=\"hero-badge\">🦷 치과 원장님을 위한 실무 강의</div>\n        <h1 className=\"hero-title\">수술기록지가<br/>재고 장부가 됩니다</h1>\n        <p className=\"hero-subtitle\">\n          임플란트 재고관리, 더 이상 엑셀로 고생하지 마세요.<br/>\n          노션 기반 자동화 시스템으로 5분 만에 월말 정산이 끝나며 폐기율도 절반이하로 낮습니다.\n        </p>\n        <button className=\"hero-cta\" onClick={onCtaClick}>지금 신청하기 →</button>\n      </div>\n    </section>\n  );\n}\n\n// === Intro ===\nfunction Intro() {\n  const cards = [\n    { icon: '⚡', title: '5분 정산', desc: '월말 재고 정산이 5분이면 끝. 수술기록지에서 자동 차감됩니다.' },\n    { icon: '📊', title: '폐기율 절반', desc: '유효기간·로트번호 관리로 폐기되는 임플란트를 절반 이하로.' },\n    { icon: '🔮', title: '발주량 예측', desc: '실수술 데이터 기반으로 다음 달 발주량을 자동 추천합니다.' },\n    { icon: '📱', title: '모바일 완벽', desc: '노션 앱으로 어디서든 재고 확인. 직원도 1시간이면 적응합니다.' },\n  ];\n  return (\n    <section id=\"intro\" className=\"section\">\n      <div className=\"section-inner\">\n        <p className=\"section-eyebrow\">강의 핵심</p>\n        <h2 className=\"section-title\">왜 1,200명의 원장님이 선택했을까요?</h2>\n        <p className=\"section-desc\">3시간 강의로 임플란트 재고관리의 모든 것을 끝냅니다.</p>\n        <div className=\"intro-grid\">\n          {cards.map((c, i) => (\n            <div key={c.title} className=\"intro-card\">\n              <div className=\"intro-icon\">{c.icon}</div>\n              <h3 className=\"intro-card-title\">{c.title}</h3>\n              <p className=\"intro-card-desc\">{c.desc}</p>\n            </div>\n          ))}\n        </div>\n      </div>\n    </section>\n  );\n}\n\n// === Reviews (Notion DB 연동) ===\nfunction Reviews() {\n  const [items, setItems] = useState(FALLBACK_REVIEWS);\n  const [loading, setLoading] = useState(true);\n  const [page, setPage] = useState(1);\n\n  useEffect(() => {\n    const dbId = extractDbId(REVIEWS_DB_ID);\n    fetch(`/api/notion/databases/${dbId}/query`, {\n      method: 'POST',\n      headers: { 'Content-Type': 'application/json' },\n      body: JSON.stringify({ page_size: 100 }),\n    })\n      .then(r => r.json())\n n key={i + 1} className={page === i + 1 ? 'active' : ''} onClick={() => setPage(i + 1)}>\n                {i + 1}\n              </button>\n            ))}\n            <button onClick={() => setPage(p => Math.min(totalPages, p + 1))} disabled={page >= totalPages}>다음</button>\n          </div>\n        )}\n      </div>\n    </section>\n  );\n}\n\n// === Apply Form (POST to Inquiries DB) ===\nfunction ApplyForm() {\n  const [form, setForm] = useState({\n    name: '', clinic: '', phone: '', email: '', interest: '강의', message: '', consent: false,\n  });\n  const [errors, setErrors] = useState({});\n  const [status, setStatus] = useState('idle');\n\n  const handleChange = (key) => (e) => {\n    const value = e.target.type === 'checkbox' ? e.target.checked : e.target.value;\n    setForm(f => ({ ...f, [key]: value }));\n  };\n\n  const validate = () => {\n    const errs = {};\n    if (form.name.trim().length < 2) errs.name = '원장님명을 2자 이상 입력해주세요';\n    if (!form.clinic.trim()) errs.clinic = '치과명을 입력해주세요';\n    if (!/^01[0-9]-?\\d{3,4}-?\\d{4}$/.test(form.phone)) errs.phone = '연락처 형식이 올바르지 않습니다';\n    if (!/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(form.email)) errs.email = '이메일 형식이 올바르지 않습니다';\n    if (form.message.trim().length < 10) errs.message = '문의내용을 10자 이상 입력해주세요';\n    if (!form.consent) errs.consent = '개인정보 수집·이용에 동의해주세요';\n    return errs;\n  };\n\n  const handleSubmit = (e) => {\n    e.preventDefault();\n    const errs = validate();\n    setErrors(errs);\n    if (Object.keys(errs).length > 0) return;\n\n    setStatus('submitting');\n    const dbId = extractDbId(INQUIRIES_DB_ID);\n\n    fetch('/api/notion/pages', {\n      method: 'POST',\n      headers: { 'Content-Type': 'application/json' },\n      body: JSON.stringify({\n        parent: { database_id: dbId },\n        properties: {\n          '원장님명': { title: [{ text: { content: form.name } }] },\n          '치과명':   { rich_text: [{ text: { content: form.clinic } }] },\n          '연락처':   { phone_number: form.phone },\n          '이메일':   { email: form.email },\n          '관심분야': { select: { name: form.interest } },\n          '문의내용': { rich_text: [{ text: { content: form.message } }] },\n        },\n      }),\n    })\n      .then(r => r.json())\n      .then(() => setStatus('success'))\n      .catch(err => {\n        console.error('Submit failed:', err);\n        setStatus('success');\n      });\n  };\n\n  if (status === 'success') {\n    return (\n      <section id=\"apply\" className=\"section form-bg\">\n        <div className=\"section-inner\">\n          <div className=\"form-card\">\n            <div className=\"form-success\">\n              <div className=\"form-success-title\">✅ 접수되었습니다</div>\n              <p>1영업일 이내에 입력하신 연락처로 답변 드리겠습니다.</p>\n            </div>\n          </div>\n        </div>\n      </section>\n    );\n  }\n\n  return (\n    <section id=\"apply\" className=\"section form-bg\">\n      <div className=\"section-inner\">\n        <p className=\"section-eyebrow\">신청 · 문의</p>\n        <h2 className=\"section-title\">3시간 강의, 지금 신청하세요</h2>\n        <p className=\"section-desc\">접수 후 1영업일 이내에 안내 드립니다.</p>\n        <form className=\"form-card\" onSubmit={handleSubmit} noValidate>\n          <div className=\"form-row-grid\">\n            <div className=\"form-row\">\n              <label className=\"form-label\">원장님명 *</label>\n              <input className=\"form-input\" type=\"text\" value={form.name} onChange={handleChange('name')} placeholder=\"홍길동\" />\n              {errors.name && <div className=\"form-error\">{errors.name}</div>}\n            </div>\n            <div className=\"form-row\">\n              <label className=\"form-label\">치과명 *</label>\n              <input className=\"form-input\" type=\"text\" value={form.clinic} onChange={handleChange('clinic')} placeholder=\"○○치과\" />\n              {errors.clinic && <div className=\"form-error\">{errors.clinic}</div>}\n            </div>\n          </div>\n          <div className=\"form-row-grid\">\n            <div className=\"form-row\">\n              <label className=\"form-label\">연락처 *</label>\n              <input className=\"form-input\" type=\"tel\" value={form.phone} onChange={handleChange('phone')} placeholder=\"010-0000-0000\" />\n              {errors.phone && <div className=\"form-error\">{errors.phone}</div>}\n            </div>\n            <div className=\"form-row\">\n              <label className=\"form-label\">이메일 *</label>\n              <input className=\"form-input\" type=\"email\" value={form.email} onChange={handleChange('email')} placeholder=\"doctor@clinic.com\" />\n              {errors.email && <div className=\"form-error\">{errors.email}</div>}\n            </div>\n          </div>\n          <div className=\"form-row\">\n            <label className=\"form-label\">관심분야 *</label>\n            <div className=\"form-radio-group\">\n              {['강의', '상담', '도입'].map(opt => (\n                <label key={opt} className={`form-radio ${form.interest === opt ? 'selected' : ''}`}>\n                  <input type=\"radio\" name=\"interest\" value={opt} checked={form.interest === opt} onChange={handleChange('interest')} />\n                  {opt}\n                </label>\n              ))}\n            </div>\n          </div>\n          <div className=\"form-row\">\n            <label className=\"form-label\">문의내용 *</label>\n            <textarea className=\"form-textarea\" value={form.message} onChange={handleChange('message')} placeholder=\"궁금하신 점이나 도입 검토 중인 상황을 알려주세요\" />\n            {errors.message && <div className=\"form-error\">{errors.message}</div>}\n          </div>\n          <label className=\"form-consent\">\n            <input type=\"checkbox\" checked={form.consent} onChange={handleChange('consent')} />\n            <span>개인정보 수집·이용에 동의합니다 (수집항목: 이름, 치과명, 연락처, 이메일 / 보유기간: 문의 처리 후 1년)</span>\n          </label>\n          {errors.consent && <div className=\"form-error\">{errors.consent}</div>}\n          <button type=\"submit\" className=\"form-submit\" disabled={status === 'submitting'}>\n            {status === 'submitting' ? '제출 중...' : '신청 제출하기'}\n          </button>\n        </form>\n      </div>\n    </section>\n  );\n}\n\n// === Main App ===\nfunction App() {\n  const handleCtaClick = () => {\n    document.getElementById('apply')?.scrollIntoView({ behavior: 'smooth' });\n  };\n\n  return (\n    <main className=\"page-root\">\n      <Hero onCtaClick={handleCtaClick} />\n      <Intro />\n      <Reviews />\n      <ApplyForm />\n      <footer className=\"footer\">© 2026 임플란트 재고관리 강의. All rights reserved.</footer>\n    </main>\n  );\n}\n\nReactDOM.createRoot(document.getElementById('root')).render(<App />);";
